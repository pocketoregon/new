name: Daily AI News Fetch

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run news fetch script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: python fetch_news.py

      - name: Verify news.json was created
        run: |
          if [ ! -f news.json ]; then
            echo "ERROR: news.json was not created."
            exit 1
          fi
          echo "Article count: $(python -c "import json; d=json.load(open('news.json')); print(len(d['articles']))")"

      - name: Commit and push updated news.json
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add news.json
          if git diff --staged --quiet; then
            echo "No changes — skipping commit."
          else
            EDITION_DATE=$(python -c "import json; d=json.load(open('news.json')); print(d['date'])")
            git commit -m "chore: daily news update for ${EDITION_DATE} [skip ci]"
            git push origin main
          fi
