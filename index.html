<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Tech Briefing</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['"Playfair Display"', 'serif'],
            body: ['"DM Sans"', 'sans-serif'],
          },
          colors: {
            ink: '#0d0d0d',
            paper: '#f5f0e8',
            accent: '#c8392b',
            muted: '#7a7060',
          },
          animation: {
            'fade-up': 'fadeUp 0.6s ease forwards',
          },
          keyframes: {
            fadeUp: {
              '0%': { opacity: '0', transform: 'translateY(24px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
          },
        },
      },
    };
  </script>
  <style>
    body {
      background-color: #f5f0e8;
      font-family: 'DM Sans', sans-serif;
      color: #0d0d0d;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.35;
    }

    .card-stagger:nth-child(1) { animation-delay: 0.05s; }
    .card-stagger:nth-child(2) { animation-delay: 0.15s; }
    .card-stagger:nth-child(3) { animation-delay: 0.25s; }
    .card-stagger:nth-child(4) { animation-delay: 0.35s; }
    .card-stagger:nth-child(5) { animation-delay: 0.45s; }
    .card-stagger:nth-child(6) { animation-delay: 0.55s; }
    .card-stagger:nth-child(7) { animation-delay: 0.65s; }

    .divider-line {
      background: repeating-linear-gradient(
        90deg,
        #0d0d0d 0px,
        #0d0d0d 4px,
        transparent 4px,
        transparent 10px
      );
      height: 2px;
    }

    .tag-pill {
      display: inline-block;
      padding: 2px 10px;
      border: 1px solid #0d0d0d;
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-radius: 999px;
    }

    .article-card {
      border-top: 2px solid #0d0d0d;
      opacity: 0;
      transition: background 0.2s ease;
    }

    .article-card:hover { background: rgba(200, 57, 43, 0.04); }

    .headline-number {
      font-family: 'Playfair Display', serif;
      font-weight: 900;
      font-size: 3rem;
      line-height: 1;
      color: #e8e0d0;
      user-select: none;
    }

    .top-article {
      border: 2px solid #0d0d0d;
      background: white;
      opacity: 0;
      overflow: hidden;
    }

    .hero-image {
      width: 100%;
      height: 280px;
      object-fit: cover;
      display: block;
    }

    .hero-image-placeholder {
      width: 100%;
      height: 280px;
      background: linear-gradient(135deg, #e8e0d0 0%, #d4c9b8 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

.thumb-image {
      width: 180px;
      height: 150px;
      object-fit: cover;
      border-radius: 6px;
      flex-shrink: 0;
    }

    .thumb-placeholder {
      width: 180px;
      height: 150px;
      background: linear-gradient(135deg, #e8e0d0 0%, #d4c9b8 100%);
      border-radius: 6px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .read-more-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #c8392b;
      border: 1px solid #c8392b;
      padding: 4px 12px;
      border-radius: 999px;
      text-decoration: none;
      transition: all 0.2s ease;
    }

    .read-more-btn:hover {
      background: #c8392b;
      color: white;
    }

    .read-more-btn svg {
      width: 11px;
      height: 11px;
      transition: transform 0.2s ease;
    }

    .read-more-btn:hover svg { transform: translate(2px, -2px); }

    #error-state, #loading-state { display: none; }

    .skeleton {
      background: linear-gradient(90deg, #e8e0d0 25%, #f0e8dc 50%, #e8e0d0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 4px;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .progress-bar {
      position: fixed;
      top: 0;
      left: 0;
      height: 3px;
      background: #c8392b;
      z-index: 100;
      transition: width 0.3s ease;
    }
  </style>
</head>
<body class="min-h-screen relative">

  <div class="progress-bar" id="progress-bar" style="width: 0%"></div>

  <header class="relative z-10 border-b-2 border-ink px-6 md:px-12 py-6">
    <div class="max-w-6xl mx-auto flex items-center justify-between">
      <div>
        <div class="text-xs font-body font-500 tracking-widest text-muted uppercase mb-1">Daily Intelligence</div>
        <h1 class="font-display font-black text-3xl md:text-4xl text-ink leading-none">
          AI<span class="text-accent">·</span>Brief
        </h1>
      </div>
      <div class="text-right">
        <div class="text-xs text-muted font-body tracking-wide uppercase" id="edition-date">Loading edition…</div>
        <div class="text-xs text-muted font-body mt-1" id="article-count"></div>
      </div>
    </div>
  </header>

  <main class="relative z-10 max-w-6xl mx-auto px-6 md:px-12 py-10">

    <!-- Loading State -->
    <div id="loading-state">
      <div class="space-y-6">
        <div class="top-article border-2 border-ink" style="opacity:1">
          <div class="skeleton w-full" style="height:280px; border-radius:0;"></div>
          <div class="p-6 space-y-3">
            <div class="skeleton h-4 w-24"></div>
            <div class="skeleton h-8 w-full"></div>
            <div class="skeleton h-16 w-5/6"></div>
          </div>
        </div>
        <div class="space-y-6 mt-8">
          <div class="article-card pt-4" style="opacity:1; border-top: 2px solid #0d0d0d;">
            <div class="flex gap-4">
              <div class="skeleton" style="width:110px; height:90px; border-radius:4px; flex-shrink:0;"></div>
              <div class="flex-1 space-y-2">
                <div class="skeleton h-4 w-20"></div>
                <div class="skeleton h-5 w-full"></div>
                <div class="skeleton h-10 w-5/6"></div>
              </div>
            </div>
          </div>
          <div class="article-card pt-4" style="opacity:1; border-top: 2px solid #0d0d0d;">
            <div class="flex gap-4">
              <div class="skeleton" style="width:110px; height:90px; border-radius:4px; flex-shrink:0;"></div>
              <div class="flex-1 space-y-2">
                <div class="skeleton h-4 w-24"></div>
                <div class="skeleton h-5 w-3/4"></div>
                <div class="skeleton h-10 w-full"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Error State -->
    <div id="error-state" class="text-center py-24">
      <div class="font-display text-6xl text-accent font-black mb-4">404</div>
      <div class="font-body text-lg text-muted mb-2">Today's briefing hasn't loaded yet.</div>
      <p class="text-sm text-muted max-w-sm mx-auto">The daily news fetch runs at midnight UTC. Trigger the workflow manually in your GitHub Actions tab.</p>
    </div>

    <!-- News Content -->
    <div id="news-content" style="display:none">

      <!-- Hero Story -->
      <section class="mb-12">
        <div class="divider-line mb-6"></div>
        <div class="text-xs font-body tracking-widest text-muted uppercase mb-4">Top Story</div>
        <div id="hero-card" class="top-article animate-fade-up"></div>
      </section>

      <!-- Further Reading -->
      <section>
        <div class="divider-line mb-6"></div>
        <div class="text-xs font-body tracking-widest text-muted uppercase mb-8">Further Reading</div>
        <div id="articles-grid" class="space-y-0"></div>
      </section>

      <!-- Footer -->
      <footer class="mt-16 pt-6 border-t-2 border-ink flex flex-col md:flex-row items-start md:items-center justify-between gap-4">
        <div class="text-xs text-muted font-body">
          Real news simplified by <span class="font-500 text-ink">Gemini AI</span> · Refreshes daily at midnight UTC
        </div>
        <div class="text-xs text-muted font-body" id="generated-at"></div>
      </footer>

    </div>
  </main>

  <script>
    const progressBar = document.getElementById('progress-bar');
    function setProgress(pct) { progressBar.style.width = pct + '%'; }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      const parts = dateStr.split('-');
      if (parts.length === 3) {
        return new Date(parts[0], parts[1] - 1, parts[2])
          .toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
      }
      return dateStr;
    }

    function getCategoryColor(category) {
      const map = {
        'AI': '#c8392b', 'Hardware': '#2563eb', 'Software': '#7c3aed',
        'Security': '#b45309', 'Science': '#065f46', 'Business': '#374151',
        'Policy': '#9f1239', 'Startups': '#0e7490',
      };
      return map[category] || '#374151';
    }

    function readMoreBtn(url) {
      if (!url) return '';
      return `<a href="${url}" target="_blank" rel="noopener noreferrer" class="read-more-btn">
        Read full article
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M7 17L17 7M7 7h10v10"/>
        </svg>
      </a>`;
    }

    function heroImageHtml(image) {
      if (!image) {
        return `<div class="hero-image-placeholder">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#b4a89a" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
        </div>`;
      }
      return `<img
        src="${image}"
        class="hero-image"
        alt="Article image"
        onerror="this.parentElement.innerHTML='<div class=\\'hero-image-placeholder\\'><svg width=\\'48\\' height=\\'48\\' viewBox=\\'0 0 24 24\\' fill=\\'none\\' stroke=\\'#b4a89a\\' stroke-width=\\'1.5\\'><rect x=\\'3\\' y=\\'3\\' width=\\'18\\' height=\\'18\\' rx=\\'2\\'/><circle cx=\\'8.5\\' cy=\\'8.5\\' r=\\'1.5\\'/><polyline points=\\'21 15 16 10 5 21\\'/></svg></div>'"
      />`;
    }

    function thumbImageHtml(image) {
      if (!image) {
        return `<div class="thumb-placeholder">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#b4a89a" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
        </div>`;
      }
      return `<img
        src="${image}"
        class="thumb-image"
        alt="Article thumbnail"
        onerror="this.outerHTML='<div class=\\'thumb-placeholder\\'><svg width=\\'24\\' height=\\'24\\' viewBox=\\'0 0 24 24\\' fill=\\'none\\' stroke=\\'#b4a89a\\' stroke-width=\\'1.5\\'><rect x=\\'3\\' y=\\'3\\' width=\\'18\\' height=\\'18\\' rx=\\'2\\'/><circle cx=\\'8.5\\' cy=\\'8.5\\' r=\\'1.5\\'/><polyline points=\\'21 15 16 10 5 21\\'/></svg></div>'"
      />`;
    }

    function buildHeroCard(article) {
      const color = getCategoryColor(article.category);
      return `
        ${heroImageHtml(article.image)}
        <div class="p-6 md:p-8 flex flex-col gap-4">
          <div class="flex items-center gap-3">
            <span class="tag-pill" style="border-color:${color}; color:${color}">${article.category || 'Tech'}</span>
            ${article.source ? `<span class="text-xs text-muted font-body">${article.source}</span>` : ''}
          </div>
          <h2 class="font-display font-black text-2xl md:text-4xl text-ink leading-tight">${article.title}</h2>
          <p class="font-body text-base text-muted leading-relaxed max-w-3xl">${article.summary}</p>
          ${article.key_points && article.key_points.length > 0 ? `
            <div class="pt-4 border-t border-gray-200">
              <div class="text-xs font-body tracking-widest text-muted uppercase mb-3">Key Points</div>
              <ul class="space-y-2">
                ${article.key_points.map(pt => `
                  <li class="flex items-start gap-3 text-sm font-body text-ink">
                    <span class="mt-1.5 block w-1.5 h-1.5 rounded-full flex-shrink-0" style="background:${color}"></span>
                    <span>${pt}</span>
                  </li>`).join('')}
              </ul>
            </div>` : ''}
          ${article.impact ? `
            <div class="bg-ink text-paper px-4 py-3 text-sm font-body leading-relaxed">
              <span class="font-500 text-accent uppercase text-xs tracking-wider">Why it matters · </span>${article.impact}
            </div>` : ''}
          ${article.url ? `<div>${readMoreBtn(article.url)}</div>` : ''}
        </div>`;
    }

function buildArticleCard(article, index) {
      const color = getCategoryColor(article.category);
      const div = document.createElement('div');
      div.className = 'article-card card-stagger animate-fade-up py-5 px-0';
      div.innerHTML = `
        <div class="flex gap-4 md:gap-6 items-start">
          <div class="hidden md:flex flex-col items-center pt-1 flex-shrink-0" style="width:36px">
            <span class="headline-number">${String(index).padStart(2, '0')}</span>
          </div>
          <div class="flex-shrink-0" style="width:180px; height:150px; overflow:hidden; border-radius:6px;">
            ${thumbImageHtml(article.image)}
          </div>
          <div class="flex-1 min-w-0 space-y-2">
            <div class="flex flex-wrap items-center gap-2">
              <span class="tag-pill" style="border-color:${color}; color:${color}">${article.category || 'Tech'}</span>
              ${article.source ? `<span class="text-xs text-muted font-body">${article.source}</span>` : ''}
            </div>
            <h3 class="font-display font-bold text-lg md:text-xl text-ink leading-tight">${article.title}</h3>
            <p class="font-body text-sm text-muted leading-relaxed">${article.summary}</p>
            ${article.impact ? `
              <p class="text-xs font-body text-muted italic">
                <span class="not-italic font-500 text-ink">Impact:</span> ${article.impact}
              </p>` : ''}
            ${article.key_points && article.key_points.length > 0 ? `
              <div class="flex flex-wrap gap-2 pt-1">
                ${article.key_points.map(pt =>
                  `<span class="text-xs font-body bg-ink text-paper px-2 py-0.5 rounded-sm">${pt}</span>`
                ).join('')}
              </div>` : ''}
            ${article.url ? `<div class="pt-1">${readMoreBtn(article.url)}</div>` : ''}
          </div>
        </div>`;
      return div;
    }
    async function loadNews() {
      document.getElementById('loading-state').style.display = 'block';
      setProgress(20);

      try {
        const res = await fetch('news.json?t=' + Date.now());
        setProgress(60);
        if (!res.ok) throw new Error('Not found');

        const data = await res.json();
        setProgress(90);
        if (!data.articles || data.articles.length === 0) throw new Error('Empty');

        document.getElementById('edition-date').textContent = formatDate(data.date) || "Today's Edition";
        document.getElementById('article-count').textContent = `${data.articles.length} stories`;

        if (data.generated_at) {
          document.getElementById('generated-at').textContent =
            'Last updated: ' + new Date(data.generated_at).toLocaleString('en-US', {
              month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', timeZoneName: 'short'
            });
        }

        document.getElementById('hero-card').innerHTML = buildHeroCard(data.articles[0]);

        const grid = document.getElementById('articles-grid');
        data.articles.slice(1).forEach((article, i) => {
          grid.appendChild(buildArticleCard(article, i + 2));
        });

        document.getElementById('loading-state').style.display = 'none';
        document.getElementById('news-content').style.display = 'block';
        setProgress(100);
        setTimeout(() => { progressBar.style.opacity = '0'; }, 400);

      } catch (e) {
        document.getElementById('loading-state').style.display = 'none';
        document.getElementById('error-state').style.display = 'block';
        setProgress(100);
      }
    }

    window.addEventListener('scroll', () => {
      const scrollTop = document.documentElement.scrollTop;
      const docHeight = document.documentElement.scrollHeight - window.innerHeight;
      if (docHeight > 0 && document.getElementById('news-content').style.display !== 'none') {
        progressBar.style.width = (scrollTop / docHeight * 100) + '%';
        progressBar.style.opacity = '1';
      }
    });

    loadNews();
  </script>
</body>
</html>
