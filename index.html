```html
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI·Brief — Daily Tech Intelligence</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet" />

  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      background:#0a0a0a;
      color:#e8e8e8;
      font-family:'Inter',sans-serif;
      min-height:100vh;
    }

    img{
      max-width:100%;
      display:block;
    }

    /* Scrollbar */

    ::-webkit-scrollbar{
      width:4px;
    }

    ::-webkit-scrollbar-track{
      background:#0a0a0a;
    }

    ::-webkit-scrollbar-thumb{
      background:#333;
      border-radius:2px;
    }

    /* Header */

    .site-header{
      position:sticky;
      top:0;
      z-index:50;
      background:rgba(10,10,10,0.92);
      backdrop-filter:blur(12px);
      border-bottom:1px solid #1e1e1e;
    }

    .nav-link{
      font-size:0.78rem;
      font-weight:500;
      letter-spacing:0.06em;
      text-transform:uppercase;
      color:#888;
      padding:4px 0;
      border-bottom:2px solid transparent;
      transition:all 0.2s;
      cursor:pointer;
      background:none;
      border-top:none;
      border-left:none;
      border-right:none;
    }

    .nav-link:hover{
      color:#e8e8e8;
    }

    .nav-link.active{
      color:#e8e8e8;
      border-bottom-color:#e8384f;
    }

    /* Category pill */

    .cat-pill{
      font-size:0.6rem;
      font-weight:600;
      letter-spacing:0.1em;
      text-transform:uppercase;
      padding:3px 8px;
      border-radius:3px;
      display:inline-block;
    }

    /* Hero */

    .hero-img{
      width:100%;
      height:420px;
      object-fit:cover;
      object-position:center;
      display:block;
      background:#111;
    }

    .hero-img-placeholder{
      width:100%;
      height:420px;
      background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);
      display:flex;
      align-items:center;
      justify-content:center;
    }

    /* Article rows */

    .article-row{
      display:grid;
      grid-template-columns:220px 1fr;
      gap:20px;
      padding:24px 0;
      border-bottom:1px solid #1e1e1e;
      align-items:start;
    }

    .article-row:last-child{
      border-bottom:none;
    }

    .article-row-img{
      width:220px;
      height:150px;
      object-fit:cover;
      object-position:center;
      border-radius:6px;
      display:block;
      background:#111;
      flex-shrink:0;
    }

    .article-row-placeholder{
      width:220px;
      height:150px;
      background:#1a1a1a;
      border-radius:6px;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-shrink:0;
    }

    /* Grid cards */

    .grid-card{
      background:#111;
      border:1px solid #1e1e1e;
      border-radius:8px;
      overflow:hidden;
      transition:border-color 0.2s,transform 0.2s;
    }

    .grid-card:hover{
      border-color:#333;
      transform:translateY(-2px);
    }

    .grid-card-img{
      width:100%;
      height:180px;
      object-fit:cover;
      object-position:center;
      display:block;
      background:#111;
    }

    .grid-card-placeholder{
      width:100%;
      height:180px;
      background:#1a1a1a;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    /* Mini cards */

    .mini-card{
      display:flex;
      gap:14px;
      align-items:flex-start;
      padding:16px 0;
      border-bottom:1px solid #1a1a1a;
    }

    .mini-card:last-child{
      border-bottom:none;
    }

    .mini-card-img{
      width:72px;
      height:60px;
      object-fit:cover;
      object-position:center;
      border-radius:4px;
      flex-shrink:0;
      background:#111;
    }

    .mini-card-placeholder{
      width:72px;
      height:60px;
      background:#1a1a1a;
      border-radius:4px;
      flex-shrink:0;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    /* Read button */

    .read-btn{
      display:inline-flex;
      align-items:center;
      gap:5px;
      font-size:0.7rem;
      font-weight:600;
      letter-spacing:0.06em;
      text-transform:uppercase;
      color:#e8384f;
      text-decoration:none;
      transition:gap 0.2s;
    }

    .read-btn:hover{
      gap:8px;
    }

    .read-btn svg{
      width:10px;
      height:10px;
    }

    /* Section label */

    .section-label{
      font-size:0.65rem;
      font-weight:600;
      letter-spacing:0.15em;
      text-transform:uppercase;
      color:#555;
      padding-bottom:12px;
      border-bottom:1px solid #1e1e1e;
      margin-bottom:0;
    }

    /* Article number */

    .art-num{
      font-family:'Playfair Display',serif;
      font-size:2.5rem;
      font-weight:900;
      color:#222;
      line-height:1;
      user-select:none;
    }

    /* Skeleton */

    .skel{
      background:linear-gradient(
        90deg,
        #1a1a1a 25%,
        #222 50%,
        #1a1a1a 75%
      );

      background-size:200% 100%;
      animation:shimmer 1.4s infinite;
      border-radius:4px;
    }

    @keyframes shimmer{
      0%{
        background-position:200% 0;
      }

      100%{
        background-position:-200% 0;
      }
    }

    /* Progress */

    #progress{
      position:fixed;
      top:0;
      left:0;
      height:2px;
      background:#e8384f;
      z-index:999;
      transition:width 0.3s ease;
      width:0%;
    }

    /* Search */

    #search-box{
      position:absolute;
      top:100%;
      right:0;
      background:#111;
      border:1px solid #2a2a2a;
      border-radius:8px;
      padding:12px;
      width:280px;
      display:none;
      margin-top:8px;
    }

    #search-box.open{
      display:block;
    }

    #search-input{
      width:100%;
      background:#1a1a1a;
      border:1px solid #2a2a2a;
      border-radius:6px;
      padding:8px 12px;
      color:#e8e8e8;
      font-size:13px;
      outline:none;
    }

    #search-input:focus{
      border-color:#e8384f;
    }

    /* Fade animation */

    .fade-up{
      opacity:0;
      transform:translateY(20px);
      animation:fadeUp 0.5s ease forwards;
    }

    @keyframes fadeUp{
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    /* Responsive */

    @media (max-width:768px){

      .article-row{
        grid-template-columns:1fr;
      }

      .article-row-img,
      .article-row-placeholder{
        width:100%;
        height:220px;
      }

      .hero-img,
      .hero-img-placeholder{
        height:260px;
      }

      .grid-card-img{
        height:220px;
      }

      #hero-grid{
        grid-template-columns:1fr !important;
      }

      #nav-tabs{
        overflow-x:auto;
        white-space:nowrap;
      }

      .art-num{
        font-size:1.8rem;
      }
    }
  </style>
</head>

<body>

<div id="progress"></div>

<header class="site-header">

  <div class="max-w-5xl mx-auto px-5">

    <!-- Top -->

    <div class="flex items-center justify-between py-3 border-b border-neutral-900">

      <div>

        <div style="font-size:0.6rem; letter-spacing:0.15em; text-transform:uppercase; color:#555; margin-bottom:2px;">
          Daily Intelligence
        </div>

        <div style="font-family:'Playfair Display',serif; font-size:1.4rem; font-weight:900;">
          AI<span style="color:#e8384f;">·</span>Brief
        </div>

      </div>

      <div class="flex items-center gap-4">

        <div id="header-date"
             style="font-size:0.7rem; color:#555; letter-spacing:0.05em; text-transform:uppercase;">
        </div>

        <div id="header-count"
             style="font-size:0.7rem; color:#555;">
        </div>

      </div>

    </div>

    <!-- Tabs -->

    <div class="flex items-center gap-6 py-2" id="nav-tabs">

      <button class="nav-link active" onclick="filterCategory('all', this)">All</button>
      <button class="nav-link" onclick="filterCategory('AI', this)">AI</button>
      <button class="nav-link" onclick="filterCategory('Business', this)">Business</button>
      <button class="nav-link" onclick="filterCategory('Policy', this)">Policy</button>
      <button class="nav-link" onclick="filterCategory('Hardware', this)">Hardware</button>
      <button class="nav-link" onclick="filterCategory('Software', this)">Software</button>

    </div>

  </div>

</header>

<main class="max-w-5xl mx-auto px-5 py-8">

  <section id="hero-section"></section>

  <div class="section-label mt-10 mb-2">
    Further Reading
  </div>

  <div id="rows-section"></div>

  <div id="grid-section" class="mt-10"></div>

</main>

<script>

const demoArticles = [

  {
    category:'Software',
    source:'Seroundtable',
    title:'Google Search Update Rolled Out',
    summary:'Google updated its search system. Many sites felt the change.',
    image:'https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1400&auto=format&fit=crop',
    url:'#'
  },

  {
    category:'Hardware',
    source:'Wccftech',
    title:'AMD Next Chips Due 2028',
    summary:'New AMD CPUs will use tiny factory process.',
    image:'https://images.unsplash.com/photo-1518770660439-4636190af475?q=80&w=1400&auto=format&fit=crop',
    url:'#'
  },

  {
    category:'Software',
    source:'Push Square',
    title:'Metal Gear Solid 4 Coming to PS5',
    summary:'MGS4 may return on modern consoles.',
    image:'https://images.unsplash.com/photo-1493711662062-fa541adb3fc8?q=80&w=1400&auto=format&fit=crop',
    url:'#'
  },

  {
    category:'Hardware',
    source:'9to5google',
    title:'Samsung Foldable Phone Name Leaks',
    summary:'New Samsung foldable naming details leaked.',
    image:'https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?q=80&w=1400&auto=format&fit=crop',
    url:'#'
  },

  {
    category:'Business',
    source:'Cars',
    title:'Racer Not Worried by Car Rules',
    summary:'GT3 race car rules continue evolving.',
    image:'https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?q=80&w=1400&auto=format&fit=crop',
    url:'#'
  },

  {
    category:'Policy',
    source:'Linux',
    title:'California Age Law Might Skip Linux',
    summary:'Open-source systems may avoid restrictions.',
    image:'https://images.unsplash.com/photo-1517336714739-489689fd1ca8?q=80&w=1400&auto=format&fit=crop',
    url:'#'
  }

];

let allArticles = demoArticles;

const catColors = {
  AI:'#e8384f',
  Hardware:'#3b82f6',
  Software:'#8b5cf6',
  Business:'#6b7280',
  Policy:'#ec4899'
};

const catBg = {
  AI:'rgba(232,56,79,0.15)',
  Hardware:'rgba(59,130,246,0.15)',
  Software:'rgba(139,92,246,0.15)',
  Business:'rgba(107,114,128,0.15)',
  Policy:'rgba(236,72,153,0.15)'
};

function catPill(cat){

  return `
    <span class="cat-pill"
      style="
        background:${catBg[cat]};
        color:${catColors[cat]};
      ">
      ${cat}
    </span>
  `;
}

function heroImg(img){

  return `
    <img
      src="${img}"
      class="hero-img"
      loading="lazy"
      alt=""
    />
  `;
}

function rowImg(img){

  return `
    <img
      src="${img}"
      class="article-row-img"
      loading="lazy"
      alt=""
    />
  `;
}

function gridImg(img){

  return `
    <img
      src="${img}"
      class="grid-card-img"
      loading="lazy"
      alt=""
    />
  `;
}

function buildHero(a){

  return `

    <div style="
      border-radius:8px;
      overflow:hidden;
      border:1px solid #1e1e1e;
    ">

      ${heroImg(a.image)}

      <div
        id="hero-grid"
        style="
          background:#111;
          display:grid;
          grid-template-columns:1fr 1fr;
          gap:24px;
          padding:24px;
        ">

        <div>

          <div style="
            display:flex;
            align-items:center;
            gap:8px;
            margin-bottom:12px;
          ">
            ${catPill(a.category)}
            <span style="font-size:0.7rem; color:#555;">
              ${a.source}
            </span>
          </div>

          <h1 style="
            font-family:'Playfair Display',serif;
            font-size:1.7rem;
            font-weight:900;
            line-height:1.2;
            margin-bottom:12px;
            color:#f0f0f0;
          ">
            ${a.title}
          </h1>

          <p style="
            font-size:0.82rem;
            color:#888;
            line-height:1.6;
            margin-bottom:16px;
          ">
            ${a.summary}
          </p>

          <a href="${a.url}" class="read-btn">
            Read Full Article
          </a>

        </div>

      </div>

    </div>

  `;
}

function buildRow(a, num){

  return `

    <div class="article-row fade-up">

      <div style="
        display:flex;
        gap:16px;
        align-items:flex-start;
      ">

        <span class="art-num">
          ${String(num).padStart(2,'0')}
        </span>

        ${rowImg(a.image)}

      </div>

      <div>

        <div style="
          display:flex;
          align-items:center;
          gap:8px;
          margin-bottom:8px;
        ">
          ${catPill(a.category)}
        </div>

        <h3 style="
          font-family:'Playfair Display',serif;
          font-size:1.1rem;
          font-weight:700;
          line-height:1.3;
          margin-bottom:8px;
          color:#f0f0f0;
        ">
          ${a.title}
        </h3>

        <p style="
          font-size:0.78rem;
          color:#777;
          line-height:1.6;
          margin-bottom:10px;
        ">
          ${a.summary}
        </p>

        <a href="${a.url}" class="read-btn">
          Read Article
        </a>

      </div>

    </div>

  `;
}

function buildGridCard(a, num){

  return `

    <div class="grid-card fade-up">

      ${gridImg(a.image)}

      <div style="padding:16px;">

        <div style="
          display:flex;
          align-items:center;
          justify-content:space-between;
          margin-bottom:8px;
        ">

          <span class="art-num" style="font-size:1.6rem;">
            ${String(num).padStart(2,'0')}
          </span>

          ${catPill(a.category)}

        </div>

        <h3 style="
          font-family:'Playfair Display',serif;
          font-size:0.95rem;
          font-weight:700;
          line-height:1.3;
          margin-bottom:8px;
          color:#f0f0f0;
        ">
          ${a.title}
        </h3>

        <p style="
          font-size:0.72rem;
          color:#777;
          line-height:1.5;
          margin-bottom:12px;
        ">
          ${a.summary}
        </p>

        <a href="${a.url}" class="read-btn">
          Read Article
        </a>

      </div>

    </div>

  `;
}

function renderArticles(articles){

  const hero = document.getElementById('hero-section');
  const rows = document.getElementById('rows-section');
  const grid = document.getElementById('grid-section');

  hero.innerHTML = buildHero(articles[0]);

  rows.innerHTML = articles
    .slice(1,4)
    .map((a,i)=>buildRow(a,i+2))
    .join('');

  grid.innerHTML = `
    <div class="section-label mb-4">
      In Brief
    </div>

    <div style="
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      gap:16px;
    ">

      ${articles
        .slice(4,6)
        .map((a,i)=>buildGridCard(a,i+5))
        .join('')
      }

    </div>
  `;
}

function filterCategory(cat, btn){

  document
    .querySelectorAll('.nav-link')
    .forEach(el=>el.classList.remove('active'));

  btn.classList.add('active');

  const filtered = cat === 'all'
    ? allArticles
    : allArticles.filter(a => a.category === cat);

  renderArticles(filtered);
}

renderArticles(allArticles);

document.getElementById('header-date').textContent =
  new Date().toLocaleDateString(
    'en-US',
    {
      weekday:'long',
      month:'long',
      day:'numeric',
      year:'numeric'
    }
  );

document.getElementById('header-count').textContent =
  allArticles.length + ' stories';

</script>

</body>
</html>
```
